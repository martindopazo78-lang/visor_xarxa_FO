<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor Xarxa FO — Buscador d'elements associats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#0f1419; --panel:#161d26; --panel2:#1c2530; --line:#26313d;
    --ink:#e6edf3; --dim:#8b97a6; --faint:#5c6773;
    --acc:#38bdf8; --acc2:#22d3a6; --warn:#f0a03c; --node:#f4c95d; --cable:#5aa9e6;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;overflow:hidden}
  #app{display:grid;grid-template-rows:auto 1fr;height:100vh}

  header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#141b24,#0f1419);padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:15px;margin:0;letter-spacing:.3px;font-weight:600}
  header h1 span{color:var(--acc)}
  .stat{font-family:var(--mono);font-size:12px;color:var(--dim)}
  .stat b{color:var(--ink);font-weight:600}
  .grow{flex:1}
  .btn{font-family:var(--sans);font-size:12px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 12px;border-radius:6px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--acc);color:var(--acc)}

  main{display:grid;grid-template-columns:360px 1fr;min-height:0}
  @media(max-width:780px){main{grid-template-columns:1fr;grid-template-rows:auto 1fr}}

  /* left */
  .side{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .searchbox{padding:12px;border-bottom:1px solid var(--line)}
  .searchbox input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--mono)}
  .searchbox input:focus{outline:none;border-color:var(--acc)}
  .filters{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .chip{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;user-select:none;font-family:var(--mono)}
  .chip.on{background:var(--panel2);color:var(--acc);border-color:var(--acc)}
  .results{overflow-y:auto;flex:1;min-height:0}
  .ritem{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .ritem:hover{background:var(--panel2)}
  .ritem.sel{background:#1a2b38;border-left:3px solid var(--acc);padding-left:9px}
  .ritem .nm{font-family:var(--mono);font-size:12.5px;color:var(--ink);word-break:break-all}
  .ritem .mt{font-size:10.5px;color:var(--faint);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
  .tag{display:inline-block;font-size:9.5px;padding:1px 6px;border-radius:3px;margin-right:5px;font-family:var(--mono)}
  .tag.p{background:#3a2f14;color:var(--node)}
  .tag.l{background:#132b3f;color:var(--cable)}
  .empty{padding:40px 20px;text-align:center;color:var(--faint);font-size:13px}

  /* right */
  .detail{overflow-y:auto;background:var(--bg);min-height:0;padding:0}
  .drop{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:40px}
  .drop.hot{background:#132029}
  .dz{border:2px dashed var(--line);border-radius:14px;padding:48px 40px;text-align:center;max-width:460px}
  .dz.hot{border-color:var(--acc)}
  .dz h2{margin:0 0 6px;font-size:18px}
  .dz p{color:var(--dim);margin:6px 0;font-size:13px}
  .dz .big{font-size:34px;opacity:.5;margin-bottom:8px}
  .prog{color:var(--acc);font-family:var(--mono);font-size:13px}

  .dhead{padding:18px 22px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(180deg,#12181f,#0f1419);z-index:2}
  .dhead .kind{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
  .dhead h2{margin:0;font-family:var(--mono);font-size:19px;word-break:break-all;color:#fff}
  .dhead .sub{margin-top:6px;color:var(--dim);font-size:12.5px;font-family:var(--mono)}
  .dhead .sub a{color:var(--acc);text-decoration:none}

  .dbody{padding:16px 22px 60px}
  .block{margin-bottom:22px}
  .block > .bt{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--acc2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .block > .bt .ct{font-family:var(--mono);color:var(--faint);letter-spacing:0}

  table.props{width:100%;border-collapse:collapse;font-size:12.5px}
  table.props td{padding:5px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.props td.k{color:var(--dim);width:150px;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
  table.props td.v{font-family:var(--mono);color:var(--ink);word-break:break-word}

  .assoc{display:grid;gap:7px}
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.12s}
  .acard:hover{border-color:var(--acc);background:var(--panel2)}
  .acard .ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .acard .ic.p{background:#3a2f14;color:var(--node)}
  .acard .ic.l{background:#132b3f;color:var(--cable)}
  .acard .info{min-width:0;flex:1}
  .acard .an{font-family:var(--mono);font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acard .as{font-size:10.5px;color:var(--faint);margin-top:1px}
  .acard .dist{font-family:var(--mono);font-size:10.5px;color:var(--acc2);flex-shrink:0}
  .none{color:var(--faint);font-size:12.5px;font-style:italic;padding:4px 0}
  .copy{cursor:pointer;color:var(--faint);font-size:11px;margin-left:6px}
  .copy:hover{color:var(--acc)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--acc);color:var(--acc);padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transition:.2s;pointer-events:none;font-family:var(--mono)}
  .toast.show{opacity:1}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a3542;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Visor Xarxa <span>FO</span></h1>
    <div class="stat" id="statLine">Cap fitxer carregat</div>
    <div class="grow"></div>
    <button class="btn" id="reloadBtn" style="display:none">Carregar altre KMZ</button>
  </header>
  <main>
    <aside class="side">
      <div class="searchbox">
        <input id="q" placeholder="Cerca per nom, codi, municipi…" autocomplete="off" disabled>
        <div class="filters" id="filters">
          <span class="chip on" data-f="all">Xarxa</span>
          <span class="chip" data-f="l">Cables</span>
          <span class="chip" data-f="caixa">Caixes</span>
          <span class="chip" data-f="node">Nodes</span>
          <span class="chip" data-f="civil">Obra civil</span>
        </div>
      </div>
      <div class="results" id="results">
        <div class="empty">Carrega un KMZ per començar</div>
      </div>
    </aside>
    <section class="detail" id="detail">
      <div class="drop" id="drop">
        <div class="dz" id="dz">
          <div class="big">⬡</div>
          <h2>Carrega el teu KMZ</h2>
          <p>Arrossega <b>Xarxa_Existent.kmz</b> aquí, o fes clic per triar-lo.</p>
          <p style="color:var(--faint);font-size:11.5px">Tot es processa al navegador. Res puja a cap servidor.</p>
          <div class="prog" id="prog"></div>
        </div>
        <input type="file" id="file" accept=".kmz,.kml" style="display:none">
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const state={els:[],points:[],lines:[],endIndex:new Map(),filter:'all',sel:null};

// ---------- càrrega fitxer ----------
const drop=$('#drop'), dz=$('#dz'), fileInput=$('#file'), prog=$('#prog');
dz.addEventListener('click',()=>fileInput.click());
$('#reloadBtn').addEventListener('click',()=>location.reload());
['dragenter','dragover'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('hot');dz.classList.add('hot')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();if(e==='drop'||!drop.contains(ev.relatedTarget)){drop.classList.remove('hot');dz.classList.remove('hot')}}));
drop.addEventListener('drop',ev=>{ev.preventDefault();const f=ev.dataTransfer.files[0];if(f)handleFile(f)});
fileInput.addEventListener('change',ev=>{const f=ev.target.files[0];if(f)handleFile(f)});

async function handleFile(f){
  prog.textContent='Llegint fitxer…';
  try{
    let kmlText;
    if(f.name.toLowerCase().endsWith('.kmz')){
      const zip=await JSZip.loadAsync(f);
      const kmlName=Object.keys(zip.files).find(n=>n.toLowerCase().endsWith('.kml'));
      if(!kmlName)throw new Error('No hi ha cap .kml dins del KMZ');
      prog.textContent='Descomprimint…';
      kmlText=await zip.files[kmlName].async('string');
    }else{
      kmlText=await f.text();
    }
    prog.textContent='Analitzant elements… (pot trigar uns segons)';
    await new Promise(r=>setTimeout(r,30));
    parseKML(kmlText);
    buildIndex();
    finishLoad(f.name);
  }catch(err){
    prog.textContent='Error: '+err.message;
    prog.style.color='var(--warn)';
  }
}

// ---------- parser KML ----------
const KEYMAP={
  'FID':'FID','NOM':'Nom','Nom':'Nom','IDPROPRIET':'Propietari','Proprietai':'Propietari',
  'IDGESTIONN':'Gestor','Gestionnai':'Gestor','IDETAT':'Estat','Etat':'Estat',
  'IDFABRICAN':'Fabricant','IDREFERENC':'Referència','IDTYPEFONC':'Funció','TypeFoncti':'Funció',
  'Codi Proje':'Codi projecte','Criticitat':'Criticitat','Observacio':'Observació',
  'ESTAT_EXEC':'Estat exec.','INVENTARI':'Inventari','DATA_DESPL':'Data desplaç.',
  'TypeStruct':'Tipus estructura','Adresse':'Adreça','Compartit':'Compartit',
  'Projecte m':'Projecte m.','TESA Codi':'TESA codi',"Tipus d'ub":"Tipus ubic.",
  'Titular de':'Titular','Emprise':'Emprise','Etiquetatg':'Etiqueta',
  'Municipi':'Municipi','Seccio del':'Secció','Dominio':'Domini',
  'LongueurCa':'Long. calc.','LongueurRe':'Long. real (m)','INE':'INE','Code':'Codi',
};
function decode(s){const t=document.createElement('textarea');t.innerHTML=s;return t.value}

function parseKML(txt){
  state.els=[];state.points=[];state.lines=[];
  const pmRe=/<Placemark\b[^>]*?(?:id="([^"]*)")?[^>]*>([\s\S]*?)<\/Placemark>/g;
  const fieldRe=/<td>([^<]*)<\/td>\s*<td>([^<]*)<\/td>/g;
  let m,auto=0;
  while((m=pmRe.exec(txt))){
    const id=m[1]||('X'+(auto++));
    const body=m[2];
    const isLine=body.indexOf('<LineString')>-1;
    // camps
    const f={};let fm;fieldRe.lastIndex=0;
    while((fm=fieldRe.exec(body))){
      const k=fm[1].trim();let v=decode(fm[2].trim());
      if(!v)continue;
      f[KEYMAP[k]||k]=v;
    }
    // coords
    const cm=/<coordinates>([\s\S]*?)<\/coordinates>/.exec(body);
    let x,y,ends=null;
    if(cm){
      const toks=cm[1].trim().split(/\s+/);
      const pts=[];
      for(const t of toks){const p=t.split(',');if(p.length>=2){const lo=+p[0],la=+p[1];if(!isNaN(lo)&&!isNaN(la))pts.push([lo,la])}}
      if(pts.length){
        if(isLine){ends=[pts[0],pts[pts.length-1]];const mid=pts[Math.floor(pts.length/2)];x=mid[0];y=mid[1];}
        else{x=pts[0][0];y=pts[0][1];}
      }
    }
    const nom=f.Nom||'';
    delete f.Nom;
    const el={id,g:isLine?'l':'p',n:nom,x,y,e:ends,f};
    el.net=isRed(el);  // true = xarxa FO (cable/caixa/node); false = obra civil
    state.els.push(el);
    if(isLine)state.lines.push(el);else state.points.push(el);
  }
}

// ---------- classificació: xarxa FO vs obra civil ----------
// Punts de xarxa: caixes (empiulament/terminal), nodes, seus. La resta (pericons,
// locals, armaris, pals, punts de canvi d'infraestructura) és obra civil.
// Cables: qualsevol línia amb nom de cable de fibra o secció; canalitzacions/rases no.
const CIVIL_STRUCT=/PERICO|PERIC\u00d3|MINIRASA|MICRORASA|CANALITZACI|CANAL |TUB |TUB M|CANAL M|CANAL P|CANAL F|GRAPAT|LOCAL|ARMARI|PAL DE|FA\u00c7ANA|PUNT CANVI|PCS|PSS|PSC|PGS|PSG|PCG|PGC|PAE|PSA|PAS|PAG|TRAM AERI|PERFORACI/i;
const CAIXA_FUNC=/EMPIULAMENT|TERMINAL|CAIXA|EMPALME/i;
const CABLE_NOM=/(^|-)(CC-|CTTI-FO|ALP-FO|.*FO-\d|.*FO-XXX)/i;
// Els _CI són punts de canvi d'infraestructura (obra civil), no nodes de xarxa
function isRed(el){
  if(el.g==='l'){
    // cable si té secció, etiqueta o nom de cable de fibra
    if(el.f['Secció']||el.f['Etiqueta'])return true;
    if(CABLE_NOM.test(el.n))return true;
    if(/(FO|FIBRA)/i.test(el.n))return true;
    return false; // canalització / rasa / tub
  }else{
    const func=el.f['Funció']||'';
    const st=el.f['Tipus estructura']||'';
    // obra civil coneguda → fora
    if(CIVIL_STRUCT.test(st)||CIVIL_STRUCT.test(func))return false;
    if(CAIXA_FUNC.test(func))return true;               // caixa empiulament/terminal
    if(/(^|_)CI\d/i.test(el.n))return false;            // punt canvi infraestructura
    if(/NODE|SEU|CENTRAL|OLT|POP|LC\d|RK\d/i.test(el.n))return true; // nodes i seus
    // resta amb nom i sense classificar → de xarxa (caixes CE, terminals CT)
    return !!el.n;
  }
}

// ---------- índex espacial per extrems ----------
const P=5; // precisió ~1m
const gk=(lo,la)=>Math.round(lo*1e5)+'_'+Math.round(la*1e5);
function buildIndex(){
  state.endIndex=new Map();
  for(const l of state.lines){
    if(!l.e)continue;
    for(const pt of l.e){
      const k=gk(pt[0],pt[1]);
      if(!state.endIndex.has(k))state.endIndex.set(k,[]);
      state.endIndex.get(k).push(l);
    }
  }
  // índex de punts per coord (per trobar punts en extrems de cables)
  state.ptIndex=new Map();
  for(const p of state.points){
    if(p.x==null)continue;
    const k=gk(p.x,p.y);
    if(!state.ptIndex.has(k))state.ptIndex.set(k,[]);
    state.ptIndex.get(k).push(p);
  }
}

// distància metres aprox
function distM(a,b,c,d){const R=6371000,rad=Math.PI/180;const dx=(c-a)*rad*Math.cos((b+d)/2*rad),dy=(d-b)*rad;return R*Math.sqrt(dx*dx+dy*dy)}

// troba elements associats a un element (per proximitat geogràfica)
function findAssoc(el){
  const cables=[],punts=[],seen=new Set([el.id]);
  const probe=[];
  if(el.g==='p'&&el.x!=null){probe.push([el.x,el.y]);}
  else if(el.g==='l'&&el.e){el.e.forEach(pt=>probe.push(pt));}
  for(const[lo,la]of probe){
    // cel·les veïnes (3x3) per tolerància
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const k=(Math.round(lo*1e5)+dx)+'_'+(Math.round(la*1e5)+dy);
      // cables amb extrem aquí (només xarxa FO, no canalitzacions)
      (state.endIndex.get(k)||[]).forEach(c=>{
        if(seen.has(c.id)||!c.net)return;seen.add(c.id);
        const d=Math.min(distM(lo,la,c.e[0][0],c.e[0][1]),distM(lo,la,c.e[1][0],c.e[1][1]));
        cables.push({el:c,d});
      });
      // punts aquí (només caixes/nodes, no pericons)
      (state.ptIndex.get(k)||[]).forEach(p=>{
        if(seen.has(p.id)||!p.net)return;seen.add(p.id);
        punts.push({el:p,d:distM(lo,la,p.x,p.y)});
      });
    }
  }
  cables.sort((a,b)=>a.d-b.d);punts.sort((a,b)=>a.d-b.d);
  return{cables,punts};
}

// ---------- cerca ----------
function isCaixa(el){return CAIXA_FUNC.test(el.f['Funció']||'')||/(^|_)CE\d/i.test(el.n)}
function matchFilter(el){
  // Per defecte NOMÉS xarxa (cables, caixes, nodes). Obra civil oculta.
  if(state.filter==='civil')return !el.net; // mostrar només obra civil (opcional)
  if(!el.net)return false;                  // amaga pericons/canalitzacions sempre
  if(state.filter==='all')return true;
  if(state.filter==='l')return el.g==='l';
  if(state.filter==='caixa')return el.g==='p'&&isCaixa(el);
  if(state.filter==='node')return el.g==='p'&&!isCaixa(el);
  return true;
}
function searchEls(term){
  term=term.trim().toLowerCase();
  const out=[];
  for(const el of state.els){
    if(!matchFilter(el))continue;
    if(!term){out.push(el);if(out.length>=300)break;continue;}
    const hay=(el.n+' '+(el.f['Codi projecte']||'')+' '+(el.f['Municipi']||'')+' '+(el.f['Etiqueta']||'')+' '+(el.f['Tipus estructura']||'')+' '+(el.f['Funció']||'')).toLowerCase();
    if(hay.indexOf(term)>-1){out.push(el);if(out.length>=300)break;}
  }
  return out;
}

// ---------- render ----------
const results=$('#results'),detail=$('#detail');
function renderResults(list){
  if(!list.length){results.innerHTML='<div class="empty">Cap coincidència</div>';return;}
  const frag=document.createDocumentFragment();
  for(const el of list){
    const d=document.createElement('div');
    d.className='ritem'+(state.sel&&state.sel.id===el.id?' sel':'');
    const meta=el.g==='p'?(el.f['Tipus estructura']||el.f['Funció']||'Punt'):(el.f['Secció']||el.f['Tipus estructura']||'Cable');
    d.innerHTML=`<div class="nm"><span class="tag ${el.g}">${el.g==='p'?'PUNT':'CABLE'}</span>${el.n||'(sense nom)'}</div><div class="mt">${escapeHtml(meta)}${el.f.Municipi?' · '+escapeHtml(el.f.Municipi):''}</div>`;
    d.onclick=()=>select(el);
    frag.appendChild(d);
  }
  results.innerHTML='';results.appendChild(frag);
}
function escapeHtml(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function propTable(el){
  const order=['Codi projecte','Municipi','Secció','Etiqueta','Long. real (m)','Long. calc.','Funció','Tipus estructura','Tipus ubic.','Titular','Propietari','Gestor','Estat','Estat exec.','Criticitat','Inventari','Data desplaç.','Observació','FID','Codi','INE'];
  const keys=Object.keys(el.f);
  const sorted=[...order.filter(k=>keys.includes(k)),...keys.filter(k=>!order.includes(k))];
  let rows='';
  for(const k of sorted){
    rows+=`<tr><td class="k">${escapeHtml(k)}</td><td class="v">${escapeHtml(el.f[k])}</td></tr>`;
  }
  return `<table class="props">${rows}</table>`;
}

function assocCard(item){
  const el=item.el;
  const meta=el.g==='p'?(el.f['Tipus estructura']||el.f['Funció']||''):(el.f['Secció']||el.f['Etiqueta']||el.f['Tipus estructura']||'');
  return `<div class="acard" data-id="${el.id}">
    <div class="ic ${el.g}">${el.g==='p'?'●':'╱'}</div>
    <div class="info"><div class="an">${escapeHtml(el.n||'(sense nom)')}</div><div class="as">${escapeHtml(meta)}</div></div>
    <div class="dist">${item.d<1?'0m':Math.round(item.d)+'m'}</div>
  </div>`;
}

function select(el){
  state.sel=el;
  document.querySelectorAll('.ritem').forEach(n=>n.classList.remove('sel'));
  const {cables,punts}=findAssoc(el);
  const isP=el.g==='p';
  const gmaps=el.x!=null?`https://www.google.com/maps?q=${el.y},${el.x}`:null;
  let html=`<div class="dhead">
    <div class="kind">${isP?'Punt · '+escapeHtml(el.f['Tipus estructura']||el.f['Funció']||''):'Cable · '+escapeHtml(el.f['Secció']||'tram')}</div>
    <h2>${escapeHtml(el.n||'(sense nom)')}<span class="copy" data-copy="${escapeHtml(el.n)}">⧉ copiar</span></h2>
    <div class="sub">${el.f['Codi projecte']?'Codi: '+escapeHtml(el.f['Codi projecte'])+' · ':''}${el.x!=null?`${el.y.toFixed(6)}, ${el.x.toFixed(6)} · <a href="${gmaps}" target="_blank">Google Maps ↗</a>`:'sense coordenades'}</div>
  </div><div class="dbody">`;

  html+=`<div class="block"><div class="bt">Propietats</div>${propTable(el)}</div>`;

  html+=`<div class="block"><div class="bt">Cables connectats <span class="ct">${cables.length}</span></div>`;
  html+= cables.length?`<div class="assoc">${cables.map(assocCard).join('')}</div>`:`<div class="none">Cap cable connectat als extrems.</div>`;
  html+=`</div>`;

  html+=`<div class="block"><div class="bt">${isP?'Altres punts al mateix lloc':'Punts als extrems'} <span class="ct">${punts.length}</span></div>`;
  html+= punts.length?`<div class="assoc">${punts.map(assocCard).join('')}</div>`:`<div class="none">Cap altre punt coincident.</div>`;
  html+=`</div></div>`;

  detail.innerHTML=html;
  detail.scrollTop=0;
  detail.querySelectorAll('.acard').forEach(c=>c.onclick=()=>{
    const t=state.els.find(e=>e.id===c.dataset.id);if(t){ensureVisible(t);select(t);}
  });
  detail.querySelectorAll('[data-copy]').forEach(c=>c.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(c.dataset.copy);toast('Copiat: '+c.dataset.copy)});
  // re-marcar a la llista
  const li=[...document.querySelectorAll('.ritem')].find(n=>n.querySelector('.nm').textContent.includes(el.n));
  if(li)li.classList.add('sel');
}

function ensureVisible(el){
  // si l'element no és a la llista actual, refresca amb el seu nom
  if(![...document.querySelectorAll('.ritem .nm')].some(n=>n.textContent.includes(el.n))){
    $('#q').value=el.n;state.filter='all';syncChips();renderResults(searchEls(el.n));
  }
}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400)}

// ---------- ui events ----------
let searchTimer;
$('#q').addEventListener('input',e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>renderResults(searchEls(e.target.value)),120)});
$('#filters').addEventListener('click',e=>{if(!e.target.dataset.f)return;state.filter=e.target.dataset.f;syncChips();renderResults(searchEls($('#q').value))});
function syncChips(){document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f===state.filter))}

function finishLoad(name){
  drop.style.display='none';
  detail.innerHTML='<div class="empty" style="padding:60px 30px">Selecciona un element de la llista per veure els seus cables i punts associats.</div>';
  $('#q').disabled=false;$('#q').focus();
  $('#reloadBtn').style.display='';
  const netCables=state.lines.filter(e=>e.net).length;
  const netCaixes=state.points.filter(e=>e.net&&isCaixa(e)).length;
  const netNodes=state.points.filter(e=>e.net&&!isCaixa(e)).length;
  const civil=state.els.filter(e=>!e.net).length;
  $('#statLine').innerHTML=`<b>${netCables.toLocaleString()}</b> cables · <b>${netCaixes.toLocaleString()}</b> caixes · <b>${netNodes.toLocaleString()}</b> nodes <span style="color:var(--faint)">· ${civil.toLocaleString()} obra civil oculta</span>`;
  renderResults(searchEls(''));
}
</script>
</body>
</html>
